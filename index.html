<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧧 LÌ XÌ 2026 🧧</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --red: #b71c1c; --gold: #ffd700; --dark: #4a0000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; background: var(--dark) url('https://www.transparenttextures.com/patterns/oriental-tiles.png');
            font-family: 'Quicksand', sans-serif; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; color: var(--gold); overflow: hidden;
        }

        header { text-align: center; margin-top: 20px; z-index: 10; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 2.5rem; margin: 0; text-shadow: 0 0 10px var(--red); }

        /* Nút xáo bài */
        .btn-shuffle {
            margin: 20px 0; padding: 12px 35px; font-size: 1.1rem; font-weight: 800;
            color: var(--dark); background: linear-gradient(45deg, var(--gold), #fff176);
            border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            transition: 0.3s;
        }

        /* Lưới 5 bao lì xì sử dụng hình ảnh thật */
        .grid {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
            width: 100%; max-width: 500px; padding: 10px;
        }
        .mini-lixi {
            width: 90px; height: 150px; 
            background: url('https://i.imgur.com/8Qp4Z0P.png') no-repeat center/cover; /* Hình bao lì xì rồng */
            border: 1px solid var(--gold); border-radius: 8px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.4s;
        }
        .mini-lixi:hover { transform: translateY(-10px); box-shadow: 0 0 20px var(--gold); }

        /* Màn hình rút tiền */
        #draw-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(10px);
        }
        
        .draw-box { position: relative; width: 260px; height: 400px; }
        
        /* Hình ảnh tờ tiền nằm thẳng */
        .bill-img {
            position: absolute; top: 20px; left: 10px; width: 240px; height: auto;
            border-radius: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1; display: none; transform: translateY(0);
        }

        .envelope-main {
            position: absolute; inset: 0; 
            background: url('https://i.imgur.com/8Qp4Z0P.png') no-repeat center/cover; /* Bao lì xì lớn */
            border: 3px solid var(--gold); border-radius: 15px; z-index: 2;
            box-shadow: 0 0 50px rgba(255,0,0,0.3); touch-action: none;
        }

        .result-text {
            position: absolute; bottom: -80px; width: 100%; text-align: center;
            font-family: 'Dancing Script', cursive; font-size: 1.8rem; color: #fff;
            display: none;
        }

        .shuffling { animation: shuffleEffect 0.5s infinite alternate; pointer-events: none; }
        @keyframes shuffleEffect { from { transform: rotate(5deg); } to { transform: rotate(-5deg); } }
        
        .hint { color: #fff; margin-bottom: 20px; font-weight: bold; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <header>
        <h1>🧧 Lì Xì 🧧</h1>
        <div style="color: #fff; font-size: 0.9rem; opacity: 0.8;">Bản Nâng Cấp Masterpiece 2026</div>
    </header>

    <button class="btn-shuffle" id="btnShuffle" onclick="shuffleGame()">XÁO LỘC MAY MẮN</button>

    <div class="grid" id="lixiGrid">
        <div class="mini-lixi"></div>
        <div class="mini-lixi"></div>
        <div class="mini-lixi"></div>
        <div class="mini-lixi"></div>
        <div class="mini-lixi"></div>
    </div>

    <div id="draw-overlay">
        <div class="hint">👇 KÉO BAO LÌ XÌ XUỐNG DƯỚI!</div>
        <div class="draw-box">
            <img src="" id="moneyImg" class="bill-img" alt="Tiền lì xì">
            <div class="envelope-main" id="mainEnvelope"></div>
            <div class="result-text" id="wishText">Chúc mừng năm mới!</div>
        </div>
        <button class="btn-shuffle" id="btnReload" style="display:none; margin-top: 120px;" onclick="location.reload()">NHẬN LỘC TIẾP</button>
    </div>

    <script>
        // Link ảnh tiền từ file bạn gửi (thay bằng link trực tiếp của bạn nếu cần)
        const moneyImages = {
            "1k": "https://i.imgur.com/XF8v9XF.jpg",
            "2k": "https://i.imgur.com/KqW4hXq.png",
            "10k": "https://i.imgur.com/GzY5Xz5.png",
            "20k": "https://i.imgur.com/VzY6Xz6.png",
            "50k": "https://i.imgur.com/BzY7Xz7.png"
        };

        const wishes = ["Tấn tài tấn lộc!", "Sức khỏe dồi dào!", "Vạn sự như ý!", "Học hành tấn tới!", "Tình duyên nở rộ!"];
        let canSelect = false;

        function shuffleGame() {
            const btn = document.getElementById('btnShuffle');
            const items = document.querySelectorAll('.mini-lixi');
            btn.style.display = 'none';
            items.forEach(el => el.classList.add('shuffling'));

            setTimeout(() => {
                items.forEach(el => {
                    el.classList.remove('shuffling');
                    el.style.order = Math.floor(Math.random() * 5);
                    el.onclick = () => openFocusMode();
                });
                canSelect = true;
            }, 1500);
        }

        function openFocusMode() {
            if(!canSelect) return;
            document.getElementById('draw-overlay').style.display = 'flex';
            initDrag();
        }

        function getPrize() {
            const r = Math.random() * 100;
            if (r <= 5) return "50k";
            if (r <= 20) return "20k";
            if (r <= 40) return "10k";
            if (r <= 50) return "2k";
            return "1k";
        }

        function initDrag() {
            const el = document.getElementById('mainEnvelope');
            const money = document.getElementById('moneyImg');
            let startY = 0, currentY = 0, isDragging = false;

            const onStart = (e) => {
                isDragging = true;
                startY = e.touches ? e.touches[0].clientY : e.clientY;
            };

            const onMove = (e) => {
                if (!isDragging) return;
                const y = e.touches ? e.touches[0].clientY : e.clientY;
                currentY = Math.max(0, y - startY);
                if (currentY < 350) {
                    el.style.transform = `translateY(${currentY}px)`;
                }
            };

            const onEnd = () => {
                if (!isDragging) return;
                isDragging = false;
                if (currentY > 150) {
                    // Thành công rút tiền
                    el.style.transition = '0.6s ease-out';
                    el.style.transform = 'translateY(600px)';
                    
                    const prize = getPrize();
                    money.src = moneyImages[prize];
                    money.style.display = 'block';
                    
                    document.getElementById('wishText').innerText = wishes[Math.floor(Math.random()*wishes.length)];
                    document.getElementById('wishText').style.display = 'block';
                    document.getElementById('btnReload').style.display = 'block';
                    document.querySelector('.hint').style.display = 'none';

                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                } else {
                    el.style.transform = 'translateY(0)';
                }
            };

            el.addEventListener('touchstart', onStart);
            window.addEventListener('touchmove', onMove);
            window.addEventListener('touchend', onEnd);
            el.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
        }
    </script>
</body>
</html>
