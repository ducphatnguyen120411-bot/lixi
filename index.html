<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧧 Lì Xì Tết Ất Tỵ 2026 🧧</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f1c40f; --red: #d63031; --glass: rgba(15, 15, 15, 0.9); }
        body { margin: 0; background: #0a0a0a; color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Hiệu ứng hoa rơi */
        #blossom-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        .premium-card { position: relative; width: 340px; background: var(--glass); border: 2px solid var(--gold); border-radius: 30px; padding: 30px; text-align: center; box-shadow: 0 0 50px rgba(241, 196, 15, 0.2); z-index: 10; backdrop-filter: blur(10px); }
        .title { font-family: 'Dancing Script', cursive; font-size: 3rem; color: var(--gold); margin: 0; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        .sub-title { font-size: 0.7rem; letter-spacing: 4px; color: #888; margin-bottom: 25px; font-weight: 800; }

        /* Bao lì xì */
        .envelope-wrapper { position: relative; width: 200px; height: 280px; margin: 20px auto; cursor: pointer; transition: 0.5s; }
        .envelope-img { 
            width: 100%; height: 100%; 
            background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhWWhCfxtA3XE4we_kQTJFAPA33F0GS3VwD05ac9fPx1uOZXNaFFrzA4NL3HI7kxrOV-wQ52vDx8uGUBPLHwcHd0FtCNeu4D_kYCWIHyeP-yrsK5k3hgrQMHgs4YEnTxj_n-VXbmB6qIES4RieBB85ElJ_4fd6u0_H9LnUvvUHiz4eoaxIa887oz69f-HU/w400/(%20Anhpng.com%20)%20-%20LIXI%2011.jpg');
            background-size: cover; background-position: center; border-radius: 15px; position: relative; z-index: 5; transition: 0.6s; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Số tiền hiện ra (Không dùng thẻ trắng nữa) */
        .result-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 100%; z-index: 10; transition: 0.8s cubic-bezier(.17,.67,.41,1.18);
            text-align: center; pointer-events: none;
        }

        .open .envelope-img { transform: scale(0.8) translateY(20px); filter: brightness(0.3) blur(2px); }
        .open .result-overlay { transform: translate(-50%, -50%) scale(1.2); }

        .amount { font-size: 2.5rem; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--gold), 0 0 40px var(--gold); margin: 0; }
        .wish { font-family: 'Dancing Script'; font-size: 1.6rem; color: var(--gold); margin-top: 10px; }
        
        .hint { font-size: 0.8rem; color: var(--gold); opacity: 0.8; margin-top: 20px; }

        /* Hoa mai rơi */
        .petal { position: absolute; background: #ffeb3b; border-radius: 150% 0 150% 0; animation: falling linear infinite; }
        @keyframes falling {
            0% { transform: translate(0, -10%) rotate(0deg); opacity: 1; }
            100% { transform: translate(100px, 110vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="blossom-container"></div>

<div class="premium-card">
    <div class="title">Lộc Xuân</div>
    <div class="sub-title">TẾT ẤT TỴ 2026</div>

    <div class="envelope-wrapper" id="lixi" onclick="openLixi()">
        <div class="envelope-img"></div>
        <div class="result-overlay">
            <div style="font-size: 0.7rem; color: var(--gold); font-weight: 800; letter-spacing: 2px;">CHÚC MỪNG</div>
            <h2 class="amount" id="res-amount">0đ</h2>
            <div class="wish" id="res-wish">Vạn Sự Như Ý</div>
        </div>
    </div>

    <p id="hint" class="hint">Chạm vào bao lì xì để nhận may mắn!</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
    // Tạo hiệu ứng hoa rơi
    const container = document.getElementById('blossom-container');
    for (let i = 0; i < 30; i++) {
        let petal = document.createElement('div');
        petal.className = 'petal';
        petal.style.left = Math.random() * 100 + 'vw';
        petal.style.width = petal.style.height = Math.random() * 10 + 5 + 'px';
        petal.style.animationDuration = Math.random() * 3 + 2 + 's';
        petal.style.delay = Math.random() * 5 + 's';
        container.appendChild(petal);
    }

    function openLixi() {
        const lixi = document.getElementById('lixi');
        if(lixi.classList.contains('open')) return;

        const r = Math.random() * 100;
        let money = "";
        
        // Tỷ lệ như bạn yêu cầu
        if (r <= 10) money = "50.000đ";
        else if (r <= 24) money = "36.000đ";
        else if (r <= 41) money = "20.000đ";
        else if (r <= 61) money = "10.000đ";
        else if (r <= 80) money = "5.000đ";
        else money = "2.000đ";

        document.getElementById('res-amount').innerText = money;
        lixi.classList.add('open');
        document.getElementById('hint').style.opacity = "0";

        // Pháo hoa tưng bừng
        confetti({
            particleCount: 180,
            spread: 80,
            origin: { y: 0.6 },
            colors: ['#f1c40f', '#d63031', '#ffffff']
        });
    }
</script>
</body>
</html>
