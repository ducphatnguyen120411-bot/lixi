<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧧 LÌ XÌ ĐẠI CÁT 2026 🧧</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --red: #b71c1c; --gold: #ffd700; --dark: #4a0000; }
        body {
            margin: 0; background: var(--dark) url('https://ibb.co/jkG5PnPf');
            font-family: 'Quicksand', sans-serif; min-height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; color: var(--gold);
            user-select: none; -webkit-user-select: none;
        }

        header { text-align: center; margin-top: 20px; z-index: 10; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 2.8rem; margin: 0; text-shadow: 0 0 10px var(--red); }

        .container {
            position: relative; width: 100%; max-width: 500px; height: 450px;
            margin-top: 20px; display: flex; justify-content: center; align-items: center;
        }

        /* LÌ XÌ XÒE QUẠT */
        .lixi-item {
            position: absolute; width: 110px; height: 190px;
            background: url('https://ibb.co/jkG5PnPf') no-repeat center/cover;
            border: 2px solid var(--gold); border-radius: 12px; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: -5px 5px 15px rgba(0,0,0,0.5);
            transform-origin: bottom center;
            bottom: 80px;
        }

        /* Tọa độ xòe chính xác */
        .lixi-item:nth-child(1) { transform: rotate(-35deg) translateX(-150px); }
        .lixi-item:nth-child(2) { transform: rotate(-18deg) translateX(-75px); }
        .lixi-item:nth-child(3) { transform: rotate(0deg) translateX(0); }
        .lixi-item:nth-child(4) { transform: rotate(18deg) translateX(75px); }
        .lixi-item:nth-child(5) { transform: rotate(35deg) translateX(150px); }

        .lixi-item:hover {
            transform: translateY(-60px) scale(1.2) rotate(0deg) !important;
            z-index: 100 !important;
            box-shadow: 0 0 40px var(--gold);
        }

        /* OVERLAY */
        #game-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(10px); touch-action: none;
        }

        .flip-box { width: 260px; height: 420px; perspective: 1000px; position: relative; }
        .flip-inner { width: 100%; height: 100%; transition: transform 0.8s ease-in-out; transform-style: preserve-3d; position: relative; }
        .flipped { transform: rotateY(180deg); }

        .flip-front, .flip-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border: 3px solid var(--gold); border-radius: 15px;
        }

        .flip-front { background: url('https://ibb.co/ynFt87RW') no-repeat center/cover; }
        
        .flip-back { background: #d32f2f; transform: rotateY(180deg); display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .money-bill {
            position: absolute; width: 230px; height: auto;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: -1; border-radius: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: none; pointer-events: none;
        }

        .instruction { color: white; margin-bottom: 20px; font-weight: bold; animation: bounce 1.5s infinite; font-size: 1.1rem; text-align: center; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .btn-reset {
            margin-top: 40px; padding: 15px 45px; background: linear-gradient(45deg, var(--gold), #fff176);
            border: none; border-radius: 30px; font-weight: bold; cursor: pointer; display: none;
            font-size: 1.1rem; color: #4a0000; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>

        function chooseLixi(el) {
            const overlay = document.getElementById('game-overlay');
            const flipCard = document.getElementById('flipCard');
            overlay.style.display = 'flex';

            // Tự động lật (Hình 3 sang Hình 4)
            setTimeout(() => {
                flipCard.classList.add('flipped');
                document.getElementById('hintText').innerText = "👇 VUỐT XUỐNG ĐỂ RÚT TIỀN!";
                initPullDown();
            }, 1200);
        }

        function initPullDown() {
            const card = document.getElementById('flipCard');
            const money = document.getElementById('moneyResult');
            let startY = 0, currentY = 0, isDragging = false;

            const prizes = ["1k", "2k", "10k", "20k", "50k"];
            const selectedPrize = prizes[Math.floor(Math.random() * prizes.length)];
            money.src = moneyImgs[selectedPrize];
            money.style.display = 'block';

            const handleStart = (e) => {
                isDragging = true;
                startY = e.touches ? e.touches[0].clientY : e.clientY;
                card.style.transition = 'none';
            };

            const handleMove = (e) => {
                if (!isDragging) return;
                const y = e.touches ? e.touches[0].clientY : e.clientY;
                currentY = y - startY;
                if (currentY > 0 && currentY < 450) {
                    card.style.transform = `rotateY(180deg) translateY(${currentY}px)`;
                }
            };

            const handleEnd = () => {
                if (!isDragging) return;
                isDragging = false;
                if (currentY > 150) {
                    card.style.transition = '0.6s ease-in';
                    card.style.transform = `rotateY(180deg) translateY(800px)`;
                    document.getElementById('hintText').innerText = "🎊 CHÚC MỪNG NĂM MỚI 🎊";
                    document.getElementById('btnAgain').style.display = 'block';
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                } else {
                    card.style.transition = '0.3s ease';
                    card.style.transform = `rotateY(180deg) translateY(0)`;
                }
                currentY = 0;
            };

            card.addEventListener('mousedown', handleStart);
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('mouseup', handleEnd);
            card.addEventListener('touchstart', handleStart);
            window.addEventListener('touchmove', handleMove);
            window.addEventListener('touchend', handleEnd);
        }
    </script>
