<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đại Hội Lì Xì 2026 - 10% Jackpot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --red: #d63031; --gold: #f1c40f; --bg: #1e272e; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Arial', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* Hiệu ứng hạt nền */
        #canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        
        .scroll-hint { font-size: 1.2rem; color: var(--gold); animation: bounce 2s infinite; margin-top: 20px; cursor: pointer; }

        /* Bảng xếp hạng động */
        .board { background: rgba(0,0,0,0.5); border: 1px solid var(--gold); padding: 15px; border-radius: 10px; width: 300px; height: 150px; overflow: hidden; }
        .log { font-size: 0.9rem; margin: 5px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }

        /* Bao lì xì 3D Nâng cấp */
        .box { perspective: 1000px; margin-top: 50px; }
        .envelope {
            width: 160px; height: 250px; background: var(--red); border-radius: 8px;
            position: relative; cursor: pointer; transform-style: preserve-3d;
            transition: transform 0.5s; box-shadow: 0 10px 30px rgba(0,0,0,1);
        }
        .envelope.shake { animation: shake 0.5s infinite; }
        .flap {
            position: absolute; top: 0; width: 100%; height: 80px;
            background: #b71c1c; clip-path: polygon(0 0, 100% 0, 50% 100%);
            z-index: 2; transform-origin: top; transition: 0.4s;
        }
        .open .flap { transform: rotateX(180deg); }
        
        .money {
            position: absolute; top: 20px; left: 10px; width: 140px; height: 210px;
            background: #f1f2f6; color: #2f3542; border-radius: 5px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transform: translateZ(-1px); opacity: 0; transition: 0.5s;
        }
        .open .money { opacity: 1; transform: translateZ(20px) translateY(-60px); }

        /* Overlay khi thắng */
        #win-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; z-index: 1000;
            flex-direction: column; justify-content: center; align-items: center;
        }

        @keyframes shake { 0% {transform:rotate(0)} 25% {transform:rotate(5deg)} 50% {transform:rotate(-5deg)} 75% {transform:rotate(5deg)} 100% {transform:rotate(0)} }
        @keyframes bounce { 0%, 100% {transform:translateY(0)} 50% {transform:translateY(-15px)} }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<section>
    <h1 class="animate__animated animate__pulse animate__infinite" style="color: var(--gold); font-size: 3.5rem;">🧧 SIÊU LÌ XÌ 🧧</h1>
    <p>Chào mừng bạn đến với sự kiện Tết 2026</p>
    <div class="scroll-hint" onclick="document.getElementById('s2').scrollIntoView()">Kéo xuống để xem ai đã trúng ▼</div>
</section>

<section id="s2">
    <h2 style="color: var(--gold);">LỊCH SỬ NHẬN LỘC</h2>
    <div class="board" id="live-board"></div>
    <div class="scroll-hint" onclick="document.getElementById('s3').scrollIntoView()">Kéo xuống để THỬ VẬN MAY ▼</div>
</section>

<section id="s3">
    <h2 id="status">NHẤN VÀO BAO LÌ XÌ ĐỂ MỞ</h2>
    <div class="box">
        <div class="envelope shake" id="env" onclick="handleOpen()">
            <div class="flap"></div>
            <div style="position:absolute; bottom:15px; width:100%; font-size:30px;">福</div>
            <div class="money" id="money-card">
                <h2 id="money-text">0đ</h2>
                <p style="font-size: 12px;">Chúc mừng năm mới!</p>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=Luck" width="60">
            </div>
        </div>
    </div>
</section>

<div id="win-screen">
    <h1 id="win-msg" class="animate__animated animate__zoomInDown" style="color:var(--gold); font-size: 3rem;"></h1>
    <p id="win-sub"></p>
    <button onclick="location.reload()" style="margin-top:20px; padding:15px 30px; background:var(--gold); border:none; cursor:pointer; font-weight:bold; border-radius:50px;">CHƠI LẠI</button>
</div>

<script>
    // 1. Canvas Pháo hoa
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; this.color = color;
            this.v = {x: (Math.random()-0.5)*10, y: (Math.random()-0.5)*10};
            this.a = 1;
        }
        draw() { ctx.globalAlpha = this.a; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2); ctx.fill(); }
        update() { this.x += this.v.x; this.y += this.v.y; this.v.y += 0.1; this.a -= 0.01; }
    }

    function spawnFirework() {
        const x = Math.random()*canvas.width;
        const color = `hsl(${Math.random()*360}, 70%, 50%)`;
        for(let i=0; i<50; i++) particles.push(new Particle(x, canvas.height/2, color));
    }
    setInterval(spawnFirework, 1500);

    function loop() {
        ctx.fillStyle = 'rgba(30, 39, 46, 0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
        particles = particles.filter(p => p.a > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(loop);
    }
    loop();

    // 2. Leaderboard giả
    const names = ["Anh Tuấn", "Chị Lan", "Bé Gạo", "Hoàng Boss", "Thảo My", "Ẩn Danh"];
    function updateLog() {
        const log = document.createElement('div');
        log.className = "log animate__animated animate__fadeInUp";
        const m = [1000, 5000, 10000, 20000][Math.floor(Math.random()*4)];
        log.innerHTML = `⭐ <b>${names[Math.floor(Math.random()*names.length)]}</b> vừa nhận ${m.toLocaleString()}đ`;
        const b = document.getElementById('live-board');
        b.prepend(log);
        if(b.childNodes.length > 5) b.removeChild(b.lastChild);
    }
    setInterval(updateLog, 2500);

    // 3. Logic chính (Tỷ lệ 10% cho 50k)
    function handleOpen() {
        const env = document.getElementById('env');
        if(env.classList.contains('open')) return;

        env.classList.remove('shake');
        document.getElementById('status').innerText = "Đang xử lý giao dịch...";

        setTimeout(() => {
            env.classList.add('open');
            const rand = Math.random() * 100;
            let val = "2.000đ";
            
            // LOGIC TỶ LỆ MỚI
            if(rand <= 10) val = "50.000đ"; // 10% trúng 50k
            else if(rand <= 30) val = "20.000đ";
            else if(rand <= 60) val = "10.000đ";
            else val = "5.000đ";

            document.getElementById('money-text').innerText = val;

            setTimeout(() => {
                const screen = document.getElementById('win-screen');
                screen.style.display = 'flex';
                document.getElementById('win-msg').innerText = val;
                document.getElementById('win-sub').innerText = (val === "50.000đ") ? "XUẤT SẮC! BẠN LÀ NHÀ VÔ ĐỊCH!" : "Chúc mừng bạn đã nhận được lộc!";
                
                if(val === "50.000đ") {
                    // Nổ pháo hoa liên tục khi trúng 50k
                    let count = 0;
                    let timer = setInterval(() => { spawnFirework(); count++; if(count>10) clearInterval(timer); }, 200);
                }
            }, 1000);
        }, 800);
    }
</script>
</body>
</html>
