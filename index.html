<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lì Xì Thượng Uyển 2026 - Realtime</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        /* Giữ nguyên phần CSS đẹp có hoa mai anh đào của bản trước */
        :root { --red-silk: linear-gradient(135deg, #d63031 0%, #8b0000 100%); --gold: #f1c40f; }
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        #canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        section { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 320px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: none; text-align: center; box-sizing: border-box; }
        .btn { background: var(--gold); color: black; border: none; padding: 12px 30px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        
        /* Envelope 3D */
        .lixi-wrapper { perspective: 1000px; margin: 30px 0; }
        .envelope { width: 160px; height: 250px; background: var(--red-silk); border-radius: 10px; position: relative; transform-style: preserve-3d; transition: 0.8s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .flap { position: absolute; top: 0; width: 100%; height: 80px; background: #a51e1e; clip-path: polygon(0 0, 100% 0, 50% 100%); z-index: 5; transform-origin: top; transition: 0.6s; }
        .open .flap { transform: rotateX(180deg); }
        .money { position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px; background: white; border-radius: 5px; color: #333; display: flex; flex-direction: column; justify-content: center; align-items: center; transform: translateZ(-1px); opacity: 0; transition: 0.8s; }
        .open .money { opacity: 1; transform: translateZ(40px) translateY(-80px); }

        /* Lịch sử nhận lộc (Giống hình bạn gửi) */
        .history-box { width: 350px; background: rgba(0,0,0,0.3); border: 1px solid var(--gold); border-radius: 15px; padding: 15px; margin-top: 20px; max-height: 200px; overflow-y: auto; }
        .history-title { color: var(--gold); font-weight: bold; margin-bottom: 10px; text-align: center; font-size: 1.2rem; }
        .history-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem; }
        .history-item span { margin-left: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<section id="step-1">
    <div class="glass animate__animated animate__fadeIn">
        <h1 style="color: var(--gold)">TẾT 2026</h1>
        <input type="text" id="username" placeholder="Nhập tên của bạn...">
        <button class="btn" onclick="startApp()">NHẬN LÌ XÌ</button>
    </div>
</section>

<section id="step-2" class="hidden">
    <div class="lixi-wrapper" onclick="openLixi()">
        <div class="envelope" id="env">
            <div class="flap"></div>
            <div class="money">
                <h2 id="amount-txt" style="color: #27ae60">0đ</h2>
                <p>CHÚC MỪNG NĂM MỚI</p>
            </div>
        </div>
    </div>

    <div class="history-box">
        <div class="history-title">LỊCH SỬ NHẬN LỘC</div>
        <div id="history-content">
            </div>
    </div>
</section>

<script>
    // --- 1. CẤU HÌNH FIREBASE (Thay bằng mã của bạn nếu có) ---
    const firebaseConfig = {
        databaseURL: "https://TEN-PROJECT-CUA-BAN.firebaseio.com" // THAY LINK NÀY
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // --- 2. LOGIC TỶ LỆ VÀ MỞ LÌ XÌ ---
    function openLixi() {
        const env = document.getElementById('env');
        if(env.classList.contains('open')) return;

        const name = localStorage.getItem('lixi_name');
        const rand = Math.random() * 100;
        let amount = "2.000đ";

        if(rand <= 10) amount = "50.000đ";      // 10% Jackpot
        else if(rand <= 30) amount = "36.000đ"; // 20% tiếp theo
        else if(rand <= 60) amount = "20.000đ"; 
        else amount = "10.000đ";

        env.classList.add('open');
        document.getElementById('amount-txt').innerText = amount;

        // LƯU VÀO DATABASE THẬT
        const newLixiRef = database.ref('history').push();
        newLixiRef.set({
            name: name,
            amount: amount,
            timestamp: Date.now()
        });

        localStorage.setItem('has_opened', amount);
    }

    // --- 3. HIỂN THỊ LỊCH SỬ THẬT ---
    database.ref('history').limitToLast(10).on('value', (snapshot) => {
        const data = snapshot.val();
        const content = document.getElementById('history-content');
        content.innerHTML = "";
        
        if (data) {
            // Đảo ngược mảng để người mới nhất hiện lên đầu
            Object.values(data).reverse().forEach(item => {
                content.innerHTML += `
                    <div class="history-item">
                        ⭐ <span><b>${item.name}</b> vừa nhận ${item.amount}</span>
                    </div>
                `;
            });
        }
    });

    function startApp() {
        const name = document.getElementById('username').value.trim();
        if(name === "") return alert("Nhập tên đã bạn ơi!");
        localStorage.setItem('lixi_name', name);
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    // Kiểm tra nếu đã mở rồi thì không cho mở lại
    window.onload = () => {
        if(localStorage.getItem('has_opened')) {
            startApp(); // Tự vào luôn nếu đã có tên
            document.getElementById('env').classList.add('open');
            document.getElementById('amount-txt').innerText = localStorage.getItem('has_opened');
        }
    };
    
    // (Phần code hoa rơi và pháo hoa giữ nguyên từ bản cũ nhé)
</script>
</body>
</html>
