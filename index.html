<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧧 RÚT LÌ XÌ RỒNG VÀNG 2026 🧧</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --red: #c62828; --gold: #ffd700; --dark: #5d0000; }
        body {
            margin: 0; background: #8b0000; font-family: 'Quicksand', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            color: var(--gold); overflow: hidden; touch-action: none;
        }
        h1 { font-family: 'Dancing Script', cursive; font-size: 2.5rem; margin: 15px 0; text-align: center; }
        
        #controls { margin-bottom: 20px; z-index: 10; }
        .btn-shuffle {
            background: var(--gold); color: var(--dark); border: none;
            padding: 12px 35px; font-size: 1.1rem; border-radius: 50px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .container {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
            padding: 10px; width: 95%; max-width: 500px;
        }

        /* Vỏ bao lì xì */
        .lixi-wrapper {
            position: relative; width: 100px; height: 160px;
            perspective: 1000px;
        }

        .lixi-case {
            position: absolute; width: 100%; height: 100%;
            background: var(--red); border: 2px solid var(--gold); border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2; transition: transform 0.3s;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
            pointer-events: none;
        }
        .lixi-case.active { pointer-events: auto; }
        .lixi-case::before {
            content: ""; position: absolute; top: 0; width: 100%; height: 30px;
            background: var(--dark); border-radius: 6px 6px 50% 50%; border-bottom: 1px solid var(--gold);
        }

        /* Tờ tiền bên trong */
        .money-inner {
            position: absolute; top: 10px; left: 5px; right: 5px; bottom: 10px;
            background: #fff; border-radius: 4px; z-index: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--red); text-align: center; padding: 5px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
            transform: translateY(0); /* Sẽ bị che khuất bởi lixi-case */
        }
        .money-val { font-weight: 900; font-size: 1.2rem; }
        .money-wish { font-size: 0.6rem; font-style: italic; margin-top: 5px; line-height: 1.2; }

        /* Animation xáo bài */
        .shuffling { animation: shake 0.5s infinite; }
        @keyframes shake {
            0% { transform: rotate(0deg) translate(2px, 2px); }
            50% { transform: rotate(5deg) translate(-2px, -2px); }
            100% { transform: rotate(-5deg) translate(2px, 2px); }
        }

        .opened { opacity: 0.5; pointer-events: none !important; }
    </style>
</head>
<body>

    <h1>🧧 Rút Lộc Đầu Xuân 2026 🧧</h1>
    
    <div id="controls">
        <button class="btn-shuffle" onclick="startShuffle()">Xáo Lì Xì</button>
    </div>

    <div class="container" id="grid"></div>

    <script>
        const wishes = [
            "Vạn sự như ý!", "Sức khỏe dồi dào!", "Tiền vào như nước!", 
            "Học hành tấn tới!", "Tình duyên phơi phới!", "Gia đình bình an!"
        ];

        function getMoney() {
            const r = Math.random() * 100;
            if (r <= 10) return "50.000đ";
            if (r <= 23) return "20.000đ";
            if (r <= 38) return "10.000đ";
            if (r <= 68) return "5.000đ";
            return "1.000đ";
        }

        const grid = document.getElementById('grid');

        function init() {
            grid.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'lixi-wrapper';
                
                const moneyDiv = document.createElement('div');
                moneyDiv.className = 'money-inner';
                moneyDiv.innerHTML = `<span class="money-val">?</span><span class="money-wish">...</span>`;

                const caseDiv = document.createElement('div');
                caseDiv.className = 'lixi-case';
                caseDiv.innerHTML = `<span style="font-size:30px;margin-top:20px">🐉</span><small style="font-size:10px">KÉO XUỐNG</small>`;
                
                setupDrag(caseDiv, moneyDiv);

                wrapper.appendChild(moneyDiv);
                wrapper.appendChild(caseDiv);
                grid.appendChild(wrapper);
            }
        }

        function startShuffle() {
            const cases = document.querySelectorAll('.lixi-case');
            cases.forEach(c => {
                c.classList.add('shuffling');
                c.classList.remove('active');
                c.parentElement.classList.remove('opened');
                c.style.transform = 'translateY(0)';
            });
            
            setTimeout(() => {
                cases.forEach(c => {
                    c.classList.remove('shuffling');
                    c.classList.add('active');
                    c.parentElement.style.order = Math.floor(Math.random() * 6);
                });
            }, 1200);
        }

        function setupDrag(el, moneyEl) {
            let startY = 0;
            let currentY = 0;
            let isDragging = false;

            const onStart = (e) => {
                if(!el.classList.contains('active')) return;
                isDragging = true;
                startY = e.touches ? e.touches[0].clientY : e.clientY;
                el.style.transition = 'none';
            };

            const onMove = (e) => {
                if (!isDragging) return;
                const y = e.touches ? e.touches[0].clientY : e.clientY;
                currentY = Math.max(0, y - startY);
                if (currentY < 150) {
                    el.style.transform = `translateY(${currentY}px)`;
                }
            };

            const onEnd = () => {
                if (!isDragging) return;
                isDragging = false;
                if (currentY > 80) { // Đã kéo đủ sâu để mở
                    el.style.transition = 'transform 0.5s';
                    el.style.transform = 'translateY(180px)';
                    el.classList.remove('active');
                    el.parentElement.classList.add('opened');
                    
                    // Gán tiền và lời chúc khi mở thành công
                    const m = getMoney();
                    const w = wishes[Math.floor(Math.random() * wishes.length)];
                    moneyEl.querySelector('.money-val').innerText = m;
                    moneyEl.querySelector('.money-wish').innerText = w;

                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });
                } else {
                    el.style.transition = 'transform 0.3s';
                    el.style.transform = 'translateY(0)';
                }
                currentY = 0;
            };

            el.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
            el.addEventListener('touchstart', onStart);
            window.addEventListener('touchmove', onMove);
            window.addEventListener('touchend', onEnd);
        }

        init();
    </script>
</body>
</html>
