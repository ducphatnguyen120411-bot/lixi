<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧧 LÌ XÌ LẤY LỘC 2026 🧧</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --red: #b71c1c; --gold: #ffd700; --dark: #4a0000; }
        body {
            margin: 0; background: var(--dark) url('https://www.transparenttextures.com/patterns/oriental-tiles.png');
            font-family: 'Quicksand', sans-serif; min-height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; color: var(--gold);
        }

        header { text-align: center; margin-top: 20px; z-index: 10; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 2.5rem; margin: 0; text-shadow: 0 0 10px var(--red); }

        /* Container xòe quạt */
        .container {
            position: relative; width: 100%; max-width: 500px; height: 400px;
            margin-top: 50px; display: flex; justify-content: center;
        }

        .lixi-item {
            position: absolute; width: 120px; height: 210px;
            /* LINK ẢNH BAO LÌ XÌ BẠN GỬI */
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhrQV5kLZpUr3Bb8CxB6Jh_XI9SZL9YydiTFaKeGpKjRa9NEAO9K99uJ-JEH_4GTxeCRK10qfzMoSyO6ccfWbOJ6OXo_SUaw-X3Yzp3W4jszc2IRt2G1TUFPCGR_WjsG-5zaxncAxqACByb1Zm3neDCN2W7HDQ0av-u1CEgt1P0lXbAO3bJ0fHlBj34fq0/s400-rw/(%20Anhpng.com%20)%20-%20LIXI%2013.jpg') no-repeat center/cover;
            border: 2px solid var(--gold); border-radius: 12px; cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: -5px 5px 15px rgba(0,0,0,0.5);
            transform-origin: bottom center; /* Điểm gốc để xòe */
            bottom: 50px;
        }

        /* Hiệu ứng xòe nan quạt dựa trên thứ tự */
        .lixi-item:nth-child(1) { transform: rotate(-30deg) translateX(-140px); z-index: 1; }
        .lixi-item:nth-child(2) { transform: rotate(-15deg) translateX(-70px); z-index: 2; }
        .lixi-item:nth-child(3) { transform: rotate(0deg) translateX(0); z-index: 3; }
        .lixi-item:nth-child(4) { transform: rotate(15deg) translateX(70px); z-index: 2; }
        .lixi-item:nth-child(5) { transform: rotate(30deg) translateX(140px); z-index: 1; }

        /* Hover nảy lên */
        .lixi-item:hover {
            transform: translateY(-40px) scale(1.1) !important;
            z-index: 100 !important;
            box-shadow: 0 0 30px var(--gold);
        }

        #game-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(10px);
        }

        .flip-box { width: 260px; height: 420px; perspective: 1000px; position: relative; }
        .flip-inner { width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; position: relative; }
        .flipped { transform: rotateY(180deg); }

        .flip-front, .flip-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border: 3px solid var(--gold); border-radius: 15px;
        }

        /* Mặt trước bao lì xì phóng to */
        .flip-front { 
            background: url('https://ibb.co/jkG5PnPf') no-repeat center/cover; 
        }
        
        /* Mặt sau đỏ trơn để chuẩn bị rút tiền */
        .flip-back {
            background: #d32f2f; transform: rotateY(180deg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .money-bill {
            position: absolute; width: 240px; height: auto;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: -1; border-radius: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: none;
        }

        .instruction { color: white; margin-bottom: 15px; font-weight: bold; animation: pulse 1s infinite; font-size: 1.2rem; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .btn-reset {
            margin-top: 30px; padding: 15px 40px; background: var(--gold);
            border: none; border-radius: 30px; font-weight: bold; cursor: pointer; display: none;
            font-size: 1.1rem; color: #4a0000;
        }
    </style>
</head>
<body>

    <header>
        <h1>🧧 Lì Xì LẤY LỘC 2026 🧧</h1>
        <p>Chọn một bao lì xì may mắn của bạn</p>
    </header>

    <div class="container" id="lixiContainer">
        <div class="lixi-item" onclick="chooseLixi(this)"></div>
        <div class="lixi-item" onclick="chooseLixi(this)"></div>
        <div class="lixi-item" onclick="chooseLixi(this)"></div>
        <div class="lixi-item" onclick="chooseLixi(this)"></div>
        <div class="lixi-item" onclick="chooseLixi(this)"></div>
    </div>

    <div id="game-overlay">
        <div class="instruction" id="hintText">🧧 ĐANG LẬT LÌ XÌ...</div>
        
        <div class="flip-box">
            <img src="" id="moneyResult" class="money-bill" alt="Tiền">
            <div class="flip-inner" id="flipCard">
                <div class="flip-front"></div>
                <div class="flip-back">
                    <img src="https://ibb.co/ynFt87RW" style="width: 70%; opacity: 0.2;" alt="decor">
                </div>
            </div>
        </div>

        <button class="btn-reset" id="btnAgain" onclick="location.reload()">BỐC LƯỢT MỚI</button>
    </div>

    <script>
        // CẬP NHẬT CÁC LINK ẢNH TIỀN CỦA BẠN
        const moneyImgs = {
            "1k": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRNDeRH-giyFFa6KbWyy-POCZ7Ma_brBsjSug&s",
            "2k": "https://upload.wikimedia.org/wikipedia/vi/1/14/Gi%E1%BA%A5y_b%E1%BA%A1c_2000_%C4%91%E1%BB%93ng.jpg", // Dán link ảnh tờ 2k bạn đã chuẩn bị ở đây
            "10k": "https://en.numista.com/catalogue/photos/viet_nam/629a30e8e84ca4.62721942-original.jpg",
            "20k": "https://static.tuoitre.vn/tto/i/s626/2006/05/03/KVzzpXWl.jpg",
            "50k": "https://lh4.googleusercontent.com/proxy/dmwDyn3QYJjC9hyiBDccFxjgJqxH1HSGBDS-uDuM0bg29JjUaAQgfQ8XCjXe1FBbb8bVY078j3xjNtyHNYprhiQM6f400dTypKnirbYsMrrbXk7F2JQCF5-ZqASZ5WLPAWRNt3-Myzs"
        };

        function chooseLixi(el) {
            const overlay = document.getElementById('game-overlay');
            const flipCard = document.getElementById('flipCard');
            overlay.style.display = 'flex';

            setTimeout(() => {
                flipCard.classList.add('flipped');
                document.getElementById('hintText').innerText = "👇 VUỐT XUỐNG ĐỂ RÚT LỘC!";
                initPullDown();
            }, 1000);
        }

        function initPullDown() {
            const card = document.getElementById('flipCard');
            const money = document.getElementById('moneyResult');
            let startY = 0, isDragging = false;

            const prizes = ["1k", "2k", "10k", "20k", "50k"];
            const selectedPrize = prizes[Math.floor(Math.random() * prizes.length)];
            money.src = moneyImgs[selectedPrize] || moneyImgs["2k"]; // Mặc định tờ 2k nếu link khác lỗi
            money.style.display = 'block';

            const start = (e) => {
                startY = e.touches ? e.touches[0].clientY : e.clientY;
                isDragging = true;
                card.style.transition = 'none';
            };

            const move = (e) => {
                if (!isDragging) return;
                let currentY = e.touches ? e.touches[0].clientY : e.clientY;
                let diff = currentY - startY;
                if (diff > 0 && diff < 450) {
                    card.style.transform = `rotateY(180deg) translateY(${diff}px)`;
                }
            };

            const end = (e) => {
                if (!isDragging) return;
                isDragging = false;
                let currentY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
                if (currentY - startY > 120) {
                    card.style.transition = '0.6s cubic-bezier(0.5, 0, 0.5, 1)';
                    card.style.transform = `rotateY(180deg) translateY(700px)`;
                    document.getElementById('hintText').innerText = "✨ CHÚC MỪNG NĂM MỚI 2026! ✨";
                    document.getElementById('btnAgain').style.display = 'block';
                    confetti({ particleCount: 150, spread: 80, origin: { y: 0.7 } });
                } else {
                    card.style.transition = '0.3s';
                    card.style.transform = `rotateY(180deg) translateY(0)`;
                }
            };

            card.addEventListener('mousedown', start);
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', end);
            card.addEventListener('touchstart', start);
            window.addEventListener('touchmove', move);
            window.addEventListener('touchend', end);
        }
    </script>
</body>
</html>
